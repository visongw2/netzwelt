    <style>

        .success-panel { background: #d4edda; color: #155724; padding: 15px; border-radius: 5px; margin: 20px 0; }

<body>
    <header class="header">
        <div class="container">
            <div class="logo">
                <h1><a href="index.html">Telekom & Mobilfunk Blog</a></h1>
            </div>
            <nav class="nav">
                <ul>
                    <li><a href="index.html">Startseite</a></li>
                    <li><a href="about.html">Über mich</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <article class="article-detail" id="articleContent">
                <div class="debug-panel">
                    <strong>🔄 Lade...</strong><br>
                    JavaScript wird ausgeführt...
                </div>
            </article>
            <div class="back-link">
                <a href="index.html">← Zurück zur Übersicht</a>
            </div>
        </div>
    </main>

    <footer class="footer" style="background: #333; color: white; padding: 30px 0; margin-top: 50px; text-align: center;">
        <div class="container">
            <p>&copy; 2026 Telekom & Mobilfunk Blog. Alle Rechte vorbehalten.</p>
        </div>
    </footer>

    <script>
        // ===== 完全自包含，无外部依赖 =====
        
        // 模拟文章数据（内嵌）
        const testArticle = {
            id: "test-artikel-001",
            title: "Test Artikel - Vollständig Selbst-Enthalten",
            date: "2026-05-02",
            excerpt: "Dies ist eine Test-Seite zur Überprüfung, ob JavaScript und HTML korrekt funktionieren.",
            image: "https://picsum.photos/800/400?random=9999",
            categoryName: "Test Kategorie",
            content: `<h2>Einleitung</h2>
<p>Dies ist ein <strong>Test-Artikel</strong> zur Überprüfung der Artikel-Detailseite. Wenn Sie diesen Text sehen, funktioniert alles korrekt.</p>

<h2>Hauptinhalt</h2>
<h3>Hintergrundinformationen</h3>
<p>Die Deutsche Telekom ist einer der führenden Telekommunikationsanbieter in Europa. Mit innovativen Technologien und zuverlässigen Dienstleistungen überzeugt das Unternehmen Millionen von Kunden.</p>

<h3>Technische Details</h3>
<p>Moderne Telekommunikation erfordert leistungsfähige Netze und innovative Lösungen. 5G-Technologie, Fiber-Optik und Satellitenkommunikation sind nur einige der Technologien, die heute zum Einsatz kommen.</p>

<h3>Praktische Anwendung</h3>
<p>Für Endkunden bedeutet dies schnellere Datenraten, bessere Netzabdeckung und innovative Dienste. Ob im Home-Office, bei der Nutzung von Streaming-Diensten oder in der Smart-Home-Steuerung - moderne Telekommunikation macht vieles möglich.</p>

<h2>Features dieser Test-Seite</h2>
<ul>
<li>✅ Keine externen Abhängigkeiten (kein CDN, kein fetch())</li>
<li>✅ Funktioniert mit <code>file://</code> Protokoll</li>
<li>✅ JavaScript ist vollständig in HTML eingebettet</li>
<li>✅ CSS ist vollständig in HTML eingebettet</li>
<li>✅ Bilder werden von picsum.photos geladen (externe URL, aber optional)</li>
</ul>

<h2>Code Beispiel</h2>
<pre><code>function loadArticle() {
    const articleId = getUrlParameter('id');
    console.log('Loading article:', articleId);
    // ...
}</code></pre>

<h2>Fazit</h2>
<p>Wenn alle Punkte oben angezeigt werden und <strong>keine leere Seite</strong> zu sehen ist, dann ist das Problem behoben. Die ursprüngliche artikel.html hatte möglicherweise:</p>
<ol>
<li>Fehlerhafte externe JS-Datei (Pfad falsch)</li>
<li>CDN-Ladefehler (keine Internetverbindung oder CORS)</li>
<li>JavaScript-Syntaxfehler</li>
</ol>
<p><strong>Datum:</strong> 2026-05-02<br>
<strong>Kategorie:</strong> Test<br>
<strong>Autor:</strong> System</p>`
        };

        // 获取URL参数
        function getUrlParameter(name) {
            var params = new URLSearchParams(window.location.search);
            return params.get(name);
        }

        // 渲染文章
        function renderArticle() {
            var container = document.getElementById('articleContent');
            if (!container) {
                console.error('articleContent not found');
                return;
            }

            var article = testArticle;

            var html = '';
            html += '<div class="category-badge">' + article.categoryName + '</div>';
            html += '<h1>' + article.title + '</h1>';
            html += '<div class="article-meta">Veröffentlicht am ' + article.date + '</div>';
            
            if (article.image) {
                html += '<div class="article-featured-image">';
                html += '<img src="' + article.image + '" alt="' + article.title + '" loading="lazy">';
                html += '</div>';
            }
            
            html += '<div class="article-excerpt">' + article.excerpt + '</div>';
            html += '<div class="article-content">';
            html += article.content;
            html += '</div>';

            container.innerHTML = html;

            // Debug-Info
            console.log('✅ Article rendered successfully');
            console.log('Title:', article.title);
        }

        // 显示错误
        function showError(msg) {
            var container = document.getElementById('articleContent');
            if (container) {
                container.innerHTML = '<div class="error-message"><h2>❌ Fehler</h2><p>' + msg + '</p></div>';
            }
        }

        // 主程序
        try {
            console.log('=== START TEST ===');
            
            // 检查DOM
            if (!document.getElementById('articleContent')) {
                throw new Error('Element "articleContent" nicht gefunden');
            }
            console.log('✅ DOM element found');

            // 渲染文章
            renderArticle();
            
            // 更新页面标题
            document.title = testArticle.title + ' - Test';
            
            console.log('=== TEST ERFOLGREICH ===');
        } catch (error) {
            console.error('❌ FEHLER:', error);
            showError('JavaScript Fehler: ' + error.message + '<br><br>Öffnen Sie die <strong>Browser-Konsole (F12)</strong> für Details.');
        }
    </script>
</body>
