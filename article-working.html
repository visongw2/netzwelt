    <script>
        // ===== 完全自包含，无外部依赖 =====
        
        // 简单 Markdown 解析器
        function parseMarkdown(text) {
            if (!text) return '';
            
            let html = text;
            
            // Code blocks (```)
            html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
            
            // Inline code (`)
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
            
            // Headers
            html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
            html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
            
            // Bold
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            
            // Italic
            html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
            
            // Links
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
            
            // Unordered list
            html = html.replace(/^[\*\-] (.+)$/gm, '<li>$1</li>');
            html = html.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');
            
            // Ordered list
            html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
            
            // Blockquote
            html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
            
            // Paragraphs
            html = html.replace(/\n\n/g, '</p><p>');
            html = '<p>' + html + '</p>';
            
            // Fix nested tags
            html = html.replace(/<li><p>/g, '<li>');
            html = html.replace(/<\/p><\/li>/g, '</li>');
            
            return html;
        }
        
        // 文章数据（内嵌，无需 fetch()）
        const articlesData = {
            "deutsche-telekom-kuendigt-neue-5g-initiative-an": {
                "title": "Deutsche Telekom kündigt neue 5G-Initiative an",
                "date": "2026-02-01",
                "excerpt": "Die Deutsche Telekom hat heute eine neue 5G-Initiative angekündigt, die Millionen von Kunden zugutekommen wird.",
                "image": "https://picsum.photos/800/400?random=9698",
                "categoryName": "Telekom & Netz",
                "content": "# Deutsche Telekom kündigt neue 5G-Initiative an\n\n*Die Deutsche Telekom hat heute eine neue 5G-Initiative angekündigt, die Millionen von Kunden zugutekommen wird.*\n\n## Einleitung\n\nIn diesem Artikel befassen wir uns ausführlich mit diesem wichtigen Thema rund um Telekommunikation und Mobilfunk in Deutschland.\n\n## Hauptinhalt\n\n### Hintergrundinformationen\n\nDie Deutsche Telekom ist einer der führenden Telekommunikationsanbieter in Europa. Mit innovativen Technologien und zuverlässigen Dienstleistungen überzeugt das Unternehmen Millionen von Kunden.\n\n### Technische Details\n\nModerne Telekommunikation erfordert leistungsfähige Netze und innovative Lösungen. 5G-Technologie, Fiber-Optik und Satellitenkommunikation sind nur einige der Technologien, die heute zum Einsatz kommen.\n\n### Praktische Anwendung\n\nFür Endkunden bedeutet dies schnellere Datenraten, bessere Netzabdeckung und innovative Dienste. Ob im Home-Office, bei der Nutzung von Streaming-Diensten oder in der Smart-Home-Steuerung - moderne Telekommunikation macht vieles möglich.\n\n## Fazit\n\nZusammenfassend lässt sich sagen, dass dieser Bereich der Telekommunikation sich rasant entwickelt. Es bleibt spannend zu beobachten, welche Innovationen in Zukunft folgen werden.\n"
            },
            "telekom-erreicht-millionen-marke-bei-5g-nutzern": {
                "title": "Telekom erreicht Millionen-Marke bei 5G-Nutzern",
                "date": "2024-06-16",
                "excerpt": "Die Deutsche Telekom kann eine neue Millionen-Marke bei 5G-Nutzern verkünden.",
                "image": "https://picsum.photos/800/400?random=4882",
                "categoryName": "Telekom & Netz",
                "content": "# Telekom erreicht Millionen-Marke bei 5G-Nutzern\n\n*Die Deutsche Telekom kann eine neue Millionen-Marke bei 5G-Nutzern verkünden.*\n\n## Einleitung\n\nIn diesem Artikel befassen wir uns ausführlich mit diesem wichtigen Thema rund um Telekommunikation und Mobilfunk in Deutschland.\n\n## Hauptinhalt\n\n### Hintergrundinformationen\n\nDie Deutsche Telekom ist einer der führenden Telekommunikationsanbieter in Europa. Mit innovativen Technologien und zuverlässigen Dienstleistungen überzeugt das Unternehmen Millionen von Kunden.\n\n## Fazit\n\nZusammenfassend lässt sich sagen, dass dieser Bereich der Telekommunikation sich rasant entwickelt.\n"
            },
            "esim-so-aktivieren-sie-die-elektronische-sim-karte": {
                "title": "eSIM: So aktivieren Sie die elektronische SIM-Karte",
                "date": "2026-02-05",
                "excerpt": "Eine Schritt-für-Schritt-Anleitung zur Aktivierung einer eSIM.",
                "image": "https://picsum.photos/800/400?random=8858",
                "categoryName": "Mobilfunk & SIM",
                "content": "# eSIM: So aktivieren Sie die elektronische SIM-Karte\n\n*Eine Schritt-für-Schritt-Anleitung zur Aktivierung einer eSIM.*\n\n## Einleitung\n\nIn diesem Artikel befassen wir uns ausführlich mit diesem wichtigen Thema rund um Telekommunikation und Mobilfunk in Deutschland.\n\n## Hauptinhalt\n\n### Was ist eine eSIM?\n\nEine eSIM (embedded SIM) ist ein digitaler SIM-Chip, der fest in Ihr Smartphone integriert ist. Sie müssen keine physische SIM-Karte mehr einlegen.\n\n### Aktivierung Schritt für Schritt\n\n1. Öffnen Sie die Einstellungen Ihres Smartphones\n2. Wählen Sie \"Mobilfunk\" oder \"Netzwerk\"\n3. Tippen Sie auf \"eSIM hinzufügen\"\n4. Scannen Sie den QR-Code Ihres Anbieters\n5. Warten Sie, bis die Aktivierung abgeschlossen ist\n\n### Vorteile der eSIM\n\n- Kein physischer SIM-Wechsel mehr nötig\n- Perfekt für Reisen ins Ausland\n- Platzsparend im Gerät\n\n## Fazit\n\nDie eSIM ist die Zukunft der Mobilfunktechnologie und sehr einfach zu aktivieren.\n"
            }
        };

        // 获取URL参数
        function getUrlParameter(name) {
            var params = new URLSearchParams(window.location.search);
            return params.get(name);
        }

        // 根据ID查找文章
        function findArticle(articleId) {
            if (articlesData[articleId]) {
                return articlesData[articleId];
            }
            return null;
        }

        // 加载并渲染文章
        function loadArticle() {
            var articleId = getUrlParameter('id');
            
            if (!articleId) {
                showError('Keine Artikel-ID in der URL gefunden.');
                return;
            }
            
            var article = findArticle(articleId);
            
            if (!article) {
                showError('Artikel mit ID "' + articleId + '" nicht gefunden.');
                return;
            }
            
            renderArticle(article);
        }

        // 渲染文章
        function renderArticle(article) {
            var container = document.getElementById('articleContent');
            if (!container) {
                console.error('articleContent container not found');
                return;
            }
            
            var html = '';
            html += '<div class="category-badge">' + article.categoryName + '</div>';
            html += '<h1>' + article.title + '</h1>';
            html += '<div class="article-meta">Veröffentlicht am ' + article.date + '</div>';
            
            if (article.image) {
                html += '<div class="article-featured-image">';
                html += '<img src="' + article.image + '" alt="' + article.title + '" loading="lazy">';
                html += '</div>';
            }
            
            html += '<div class="article-excerpt">' + article.excerpt + '</div>';
            html += '<div class="article-content">';
            html += parseMarkdown(article.content);
            html += '</div>';
            
            container.innerHTML = html;
            
            // 更新页面标题
            document.title = article.title + ' - Deutsche Telekom & Mobilfunk Blog';
            
            console.log('? Article rendered successfully:', article.title);
        }

        // 显示错误信息
        function showError(message) {
            var container = document.getElementById('articleContent');
            if (container) {
                container.innerHTML = '<div class="error-message"><h2>Fehler</h2><p>' + message + '</p>' +
                    '<p><a href="index.html">← Zurück zur Startseite</a></p></div>';
            }
        }

        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', function() {
            try {
                loadArticle();
            } catch (error) {
                console.error('Error:', error);
                showError('JavaScript Fehler: ' + error.message);
            }
        });
    </script>
