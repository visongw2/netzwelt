        // 渲染文章的函数
        function renderArticles(categoryId, containerId, limit) {
            try {
                var container = document.getElementById(containerId);
                if (!container) {
                    debugDiv.innerHTML += '<p style="color:red;">✗ 容器未找到: ' + containerId + '</p>';
                    return;
                }
                
                var category = articles[categoryId];
                if (!category) {
                    debugDiv.innerHTML += '<p style="color:red;">✗ 分类未找到: ' + categoryId + '</p>';
                    return;
                }
                
                // 收集所有文章
                var allArticles = [];
                for (var subKey in category.subcategories) {
                    allArticles = allArticles.concat(category.subcategories[subKey].articles);
                }
                
                // 限制数量
                if (limit && allArticles.length > limit) {
                    allArticles = allArticles.slice(0, limit);
                }
                
                debugDiv.innerHTML += '<p>✓ 找到 ' + allArticles.length + ' 篇文章用于 ' + categoryId + '</p>';
                
                // 渲染HTML
                var html = '';
                for (var i = 0; i < allArticles.length; i++) {
                    var article = allArticles[i];
                    html += '<div class="article-card">';
                    html += '<img src="' + article.image + '" alt="' + article.title + '" loading="lazy">';
                    html += '<div class="article-card-content">';
                    html += '<span class="meta">' + article.date + '</span>';
                    html += '<h3><a href="article.html?id=' + article.id + '">' + article.title + '</a></h3>';
                    html += '<p class="excerpt">' + article.excerpt + '</p>';
                    html += '<a href="article.html?id=' + article.id + '" class="read-more">Weiterlesen →</a>';
                    html += '</div></div>';
                }
                
                container.innerHTML = html;
                debugDiv.innerHTML += '<p style="color:green;">✓ 成功渲染 ' + allArticles.length + ' 篇文章到 ' + containerId + '</p>';
            } catch (e) {
                debugDiv.innerHTML += '<p style="color:red;">✗ 错误: ' + e.message + '</p>';
            }
        }
        
        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', function() {
            debugDiv.innerHTML += '<p style="color:green;">✓ DOM已加载，开始渲染文章...</p>';
            
            renderArticles('telekom', 'telekomArticles', 6);
            renderArticles('mobilfunk', 'mobilfunkArticles', 6);
            
            debugDiv.innerHTML += '<p style="color:green; font-weight:bold;">✅ 渲染完成！如果您能看到上方的文章卡片，说明一切正常！</p>';
            debugDiv.innerHTML += '<p><strong>如果还是看不到文章，请：</strong></p>';
            debugDiv.innerHTML += '<ol>';
            debugDiv.innerHTML += '<li>按 <strong>F12</strong> 打开开发者工具</li>';
            debugDiv.innerHTML += '<li>点击 <strong>Console（控制台）</strong> 选项卡</li>';
